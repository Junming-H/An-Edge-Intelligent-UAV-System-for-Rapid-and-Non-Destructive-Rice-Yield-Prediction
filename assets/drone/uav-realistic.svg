<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-label="Quadcopter UAV model">
  <defs>
    <linearGradient id="bodyTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#e7eef5"/>
      <stop offset="1" stop-color="#8fa3b8"/>
    </linearGradient>
    <linearGradient id="bodySide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cbd7e3"/>
      <stop offset="1" stop-color="#617487"/>
    </linearGradient>
    <linearGradient id="darkMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4b5d70"/>
      <stop offset="1" stop-color="#162231"/>
    </linearGradient>
    <linearGradient id="armMetal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f6f9fc"/>
      <stop offset="0.48" stop-color="#9aabbc"/>
      <stop offset="1" stop-color="#566879"/>
    </linearGradient>
    <radialGradient id="motorTop" cx="42%" cy="32%" r="70%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#c6d2dd"/>
      <stop offset="0.72" stop-color="#66798a"/>
      <stop offset="1" stop-color="#273546"/>
    </radialGradient>
    <radialGradient id="lens" cx="45%" cy="38%" r="58%">
      <stop offset="0" stop-color="#70d6ff"/>
      <stop offset="0.36" stop-color="#0a84ff"/>
      <stop offset="1" stop-color="#07111f"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#1e2c3a" flood-opacity="0.25"/>
    </filter>
    <filter id="bladeBlur" x="-20%" y="-70%" width="140%" height="240%">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>
    <g id="propeller">
      <ellipse cx="-52" cy="0" rx="72" ry="11" fill="#1f2f40" opacity="0.30" filter="url(#bladeBlur)"/>
      <ellipse cx="52" cy="0" rx="72" ry="11" fill="#1f2f40" opacity="0.30" filter="url(#bladeBlur)"/>
      <ellipse cx="0" cy="-52" rx="11" ry="72" fill="#1f2f40" opacity="0.22" filter="url(#bladeBlur)"/>
      <ellipse cx="0" cy="52" rx="11" ry="72" fill="#1f2f40" opacity="0.22" filter="url(#bladeBlur)"/>
      <circle cx="0" cy="0" r="42" fill="url(#motorTop)"/>
      <circle cx="0" cy="0" r="23" fill="#edf4fb"/>
      <circle cx="0" cy="0" r="9" fill="#324457"/>
      <path d="M-30 -15 C-54 -7 -72 2 -88 18" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.32"/>
    </g>
  </defs>

  <ellipse cx="482" cy="404" rx="278" ry="58" fill="#203449" opacity="0.13"/>

  <g filter="url(#softShadow)">
    <g opacity="0.92">
      <path d="M455 240 L260 134" stroke="url(#armMetal)" stroke-width="24" stroke-linecap="round"/>
