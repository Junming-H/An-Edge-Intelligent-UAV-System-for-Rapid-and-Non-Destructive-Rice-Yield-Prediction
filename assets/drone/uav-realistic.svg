      <circle cx="48" cy="41" r="25" fill="#111827"/>
      <circle cx="48" cy="41" r="17" fill="url(#lens)"/>
      <circle cx="41" cy="34" r="5" fill="#dff6ff" opacity="0.9"/>
      <rect x="28" y="-22" width="38" height="24" rx="7" fill="#708398"/>
