    <path d="M423 219 C447 198 514 198 539 219 L531 250 C504 237 459 237 431 250 Z" fill="#f8fbff" opacity="0.78"/>
    <path d="M468 176 L493 176 L507 207 L454 207 Z" fill="#0a84ff" opacity="0.88"/>
