    <path d="M558 347 C594 385 601 407 610 430" fill="none" stroke="#506478" stroke-width="10" stroke-linecap="round"/>
    <path d="M326 430 H392" stroke="#394b5f" stroke-width="10" stroke-linecap="round"/>
    <path d="M570 430 H636" stroke="#394b5f" stroke-width="10" stroke-linecap="round"/>

    <path d="M408 228 C428 215 535 215 555 228" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.75"/>
