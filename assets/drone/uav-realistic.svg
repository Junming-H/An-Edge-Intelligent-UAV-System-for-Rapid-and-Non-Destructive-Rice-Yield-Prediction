      <path d="M455 240 L260 134" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
      <path d="M505 240 L700 134" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
      <path d="M452 288 L248 390" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
      <path d="M508 288 L716 390" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
