  <rect class="bg" width="2020" height="820"/>
  <text class="title" x="60" y="58">姘寸ɑ浜ч噺棰勬祴绯荤粺鍔熻兘缁撴瀯鍥?/text>
  <text class="subtitle" x="60" y="90">闈㈠悜宸查儴缃插悗鍙扮郴缁燂紝灞曠ず缃戦〉鐧诲綍銆佷换鍔＄鐞嗐€佹棤浜烘満鐩戞帶銆佸浘鍍忕鐞嗐€佹寚鏍囧垎鏋愪笌浼颁骇缁撴灉绛夊姛鑳姐€?/text>

